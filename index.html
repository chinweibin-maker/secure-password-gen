<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>至尊数字安全中心 Pro</title>
    <style>
        :root { --p: #6c5ce7; --accent: #00ffcc; --bg: #0a0a0a; --card: #161616; --up: #00ff88; --down: #ff3366; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* 顶部导航 */
        .nav { background: var(--card); padding: 10px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #333; }
        .nav-btn { padding: 10px 25px; border-radius: 12px; border: 1px solid #333; background: none; color: #888; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-btn.active { background: var(--p); color: white; border-color: var(--p); box-shadow: 0 0 15px rgba(108, 92, 231, 0.4); }

        /* 内容容器 */
        .content { flex: 1; overflow: hidden; display: none; padding: 20px; }
        .content.active { display: flex; }

        /* --- 模块样式：加密终端 --- */
        .crypto-layout { width: 100%; display: flex; gap: 20px; }
        .sidebar { width: 300px; background: var(--card); border-radius: 20px; padding: 15px; overflow-y: auto; }
        .chart-main { flex: 1; background: #000; border-radius: 20px; overflow: hidden; }
        .coin-item { padding: 12px; background: #222; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .coin-item:hover { border-color: var(--accent); }

        /* --- 模块样式：安全中心 --- */
        .security-layout { width: 100%; max-width: 500px; margin: 0 auto; text-align: center; justify-content: center; display: flex; flex-direction: column; }
        .pass-box { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #333; }
        input[type="number"] { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 60px; text-align: center; }
        .btn-gen { background: var(--p); color: white; padding: 15px; border: none; border-radius: 12px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; }
        #pwd-display { background: #000; padding: 20px; border-radius: 12px; margin-top: 20px; font-family: monospace; font-size: 1.2rem; color: var(--accent); word-break: break-all; min-height: 24px; cursor: pointer; }

        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn active" onclick="switchTab('crypto', this)">📊 交易终端</button>
        <button class="nav-btn" onclick="switchTab('security', this)">🔒 安全中心</button>
    </div>

    <div id="crypto" class="content active">
        <div class="crypto-layout">
            <div class="sidebar" id="coin-list">正在同步实时数据...</div>
            <div class="chart-main">
                <div id="tradingview_widget" style="height: 100%;"></div>
            </div>
        </div>
    </div>

    <div id="security" class="content">
        <div class="security-layout">
            <div class="pass-box">
                <h2 style="margin-top:0">安全密码生成器 Pro</h2>
                <div style="margin-bottom: 20px;">
                    长度: <input type="number" id="pwd-len" value="16" min="8" max="64">
                </div>
                <button class="btn-gen" onclick="generateSecurePwd()">⚡ 生成并自动复制</button>
                <div id="pwd-display" onclick="copyPwd()">点击上方生成</div>
                <div id="strength-hint" style="font-size: 0.8rem; margin-top: 10px; color: #888;">强度: -</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. 切换逻辑
        function switchTab(id, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'crypto') initChart('BTC');
        }

        // 2. 加密终端逻辑
        function initChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + symbol + "USDT",
                "interval": "60",
                "theme": "dark",
                "container_id": "tradingview_widget"
            });
        }

        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                const list = document.getElementById('coin-list');
                list.innerHTML = '';
                
                const coins = [['bitcoin','BTC'], ['ethereum','ETH'], ['solana','SOL'], ['binancecoin','BNB'], ['dogecoin','DOGE']];
                coins.forEach(([id, sym]) => {
                    const price = data[id].usd;
                    const change = data[id].usd_24h_change.toFixed(2);
                    list.innerHTML += `
                        <div class="coin-item" onclick="initChart('${sym}')">
                            <div style="font-weight:bold">${sym}/USD</div>
                            <div style="font-family:monospace; font-size:1.1rem">$${price.toLocaleString()}</div>
                            <div class="${change >= 0 ? 'up' : 'down'}" style="font-size:0.8rem">${change}%</div>
                        </div>
                    `;
                });
            } catch (e) { console.error("API Limit"); }
        }

        // 3. 安全中心逻辑 (CSPRNG 算法)
        function generateSecurePwd() {
            const len = document.getElementById('pwd-len').value;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let ret = "";
            const crypt = window.crypto.getRandomValues(new Uint32Array(len));
            for(let i=0; i<len; i++) ret += charset[crypt[i] % charset.length];
            
            const display = document.getElementById('pwd-display');
            display.innerText = ret;
            display.style.color = "var(--accent)";
            navigator.clipboard.writeText(ret);
            document.getElementById('strength-hint').innerText = "强度: 极高 (已自动复制)";
        }

        function copyPwd() {
            const txt = document.getElementById('pwd-display').innerText;
            if(txt !== "点击上方生成") {
                navigator.clipboard.writeText(txt);
                alert("已复制！");
            }
        }

        // 启动
        fetchPrices();
        initChart('BTC');
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
